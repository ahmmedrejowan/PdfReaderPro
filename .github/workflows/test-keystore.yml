name: Test Keystore

on:
  workflow_dispatch:

jobs:
  test:
    name: Verify Keystore Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets exist
        run: |
          echo "Checking if secrets are configured..."
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "❌ KEYSTORE_BASE64 is not set"
            exit 1
          else
            echo "✅ KEYSTORE_BASE64 is set"
          fi

          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then
            echo "❌ KEYSTORE_PASSWORD is not set"
            exit 1
          else
            echo "✅ KEYSTORE_PASSWORD is set"
          fi

          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then
            echo "❌ KEY_ALIAS is not set"
            exit 1
          else
            echo "✅ KEY_ALIAS is set"
          fi

          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "❌ KEY_PASSWORD is not set"
            exit 1
          else
            echo "✅ KEY_PASSWORD is set"
          fi

      - name: Decode and verify keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "Decoding keystore..."
          echo "$KEYSTORE_BASE64" | base64 --decode > test.keystore

          echo "Verifying keystore..."
          keytool -list -keystore test.keystore -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS"

          if [ $? -eq 0 ]; then
            echo ""
            echo "✅ Keystore is valid and credentials are correct!"
          else
            echo "❌ Keystore verification failed"
            exit 1
          fi

          rm -f test.keystore
